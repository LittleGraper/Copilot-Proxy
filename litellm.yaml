model_list:
  - model_name: gpt-4
    litellm_params:
      model: github_copilot/gpt-4

  - model_name: gpt-4o
    litellm_params:
      model: github_copilot/gpt-4o

  - model_name: gpt-5.1-codex
    model_info:
      mode: responses
    litellm_params:
      model: github_copilot/gpt-5.1-codex

  - model_name: text-embedding-3-small
    model_info:
      mode: embedding
    litellm_params:
      model: github_copilot/text-embedding-3-small

litellm_settings:
  drop_params: true
  request_timeout: 600

general_settings:
  master_key: os.environ/LOCAL_API_KEY
